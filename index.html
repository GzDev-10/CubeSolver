<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rubik Solver</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0f12; --s1:#141720; --s2:#1c2030; --bdr:#252a38; --bdr-hi:#3a4260;
  --cyan:#00e5ff; --cyan2:#007a99; --green:#39ff8a; --red:#ff3d5a; --yellow:#ffd600;
  --txt:#b0b8c8; --txt-dim:#4a5060; --txt-hi:#eef0f5;
  --U:#f0f0f0; --R:#e02020; --F:#1db954; --D:#f5c800; --L:#ff7300; --B:#1565c0;
  --empty:#1a1e2a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--txt);font-family:'JetBrains Mono',monospace;
  display:flex;flex-direction:column;align-items:center;padding:16px 16px 40px;min-height:100vh}

header{width:100%;max-width:1100px;display:flex;align-items:center;gap:14px;
  border-bottom:1px solid var(--bdr);padding-bottom:12px;margin-bottom:20px}
header h1{font-family:'Syne',sans-serif;font-size:1.35rem;font-weight:800;
  color:var(--txt-hi);letter-spacing:-0.02em}
header h1 span{color:var(--cyan)}
#stepBadge{font-size:0.62rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--cyan);background:var(--s2);border:1px solid var(--bdr-hi);
  padding:3px 11px;border-radius:2px;white-space:nowrap}

/* INPUT PHASE */
#inputPhase{width:100%;max-width:1100px;display:grid;
  grid-template-columns:1fr 260px;gap:20px;align-items:start}

.cube-map{display:grid;
  grid-template-areas:". U . ." "L F R B" ". D . .";
  grid-template-columns:repeat(4,max-content);gap:8px;justify-content:center}
.face-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.face-wrap[data-f="U"]{grid-area:U}.face-wrap[data-f="L"]{grid-area:L}
.face-wrap[data-f="F"]{grid-area:F}.face-wrap[data-f="R"]{grid-area:R}
.face-wrap[data-f="B"]{grid-area:B}.face-wrap[data-f="D"]{grid-area:D}
.face-lbl{font-size:0.57rem;font-weight:700;letter-spacing:0.13em;text-transform:uppercase;
  color:var(--txt-dim);display:flex;align-items:center;gap:4px;transition:color .2s}
.face-lbl .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.face-wrap.active .face-lbl{color:var(--cyan)}
.face-wrap.done .face-lbl{color:var(--green)}
.face-grid{display:grid;grid-template-columns:repeat(3,52px);
  grid-template-rows:repeat(3,52px);gap:3px;padding:5px;
  background:var(--s1);border:2px solid var(--bdr);border-radius:5px;
  transition:border-color .2s,box-shadow .2s}
.face-wrap.active .face-grid{border-color:var(--cyan);
  box-shadow:0 0 0 1px var(--cyan2),0 0 20px rgba(0,229,255,.07)}
.face-wrap.done .face-grid{border-color:#1a3320}
.cell{border-radius:3px;background:var(--empty);border:1px solid rgba(255,255,255,.05);
  cursor:pointer;transition:transform .07s,filter .07s}
.cell.center{cursor:default;box-shadow:inset 0 0 0 2px rgba(255,255,255,.2)}
.cell:not(.center):hover{filter:brightness(1.3);transform:scale(1.08);z-index:2}
.cell[data-c="U"]{background:var(--U)}.cell[data-c="R"]{background:var(--R)}
.cell[data-c="F"]{background:var(--F)}.cell[data-c="D"]{background:var(--D)}
.cell[data-c="L"]{background:var(--L)}.cell[data-c="B"]{background:var(--B)}

.sidebar{display:flex;flex-direction:column;gap:12px}
.panel{background:var(--s1);border:1px solid var(--bdr);border-radius:6px;padding:13px}
.panel-title{font-size:0.56rem;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--txt-dim);margin-bottom:9px}
.instr{font-size:0.71rem;line-height:1.65;background:var(--s2);
  border-left:3px solid var(--cyan);padding:8px 11px;border-radius:0 4px 4px 0;color:var(--txt)}
.instr b{color:var(--cyan);font-weight:600}
.ctrs{display:flex;flex-direction:column;gap:6px}
.ctr-row{display:flex;align-items:center;gap:6px;font-size:0.65rem}
.ctr-sw{width:11px;height:11px;border-radius:2px;flex-shrink:0;border:1px solid rgba(255,255,255,.1)}
.ctr-nm{width:62px;color:var(--txt-dim);font-size:0.62rem}
.ctr-track{flex:1;height:4px;background:var(--bdr);border-radius:3px;overflow:hidden}
.ctr-fill{height:100%;border-radius:3px;transition:width .2s}
.ctr-val{width:24px;text-align:right;font-size:0.6rem}
.ctr-row.ok .ctr-val{color:var(--green)}.ctr-row.over .ctr-val{color:var(--red)}
.ctr-row.low .ctr-val{color:var(--txt-dim)}
.step-list{display:flex;flex-direction:column;gap:4px}
.step-item{display:flex;align-items:center;gap:7px;font-size:0.65rem;
  padding:4px 7px;border-radius:3px;border:1px solid transparent;
  color:var(--txt-dim);transition:all .2s}
.step-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.step-item.active{background:rgba(0,229,255,.05);border-color:var(--cyan2);color:var(--cyan)}
.step-item.done{color:var(--green)}
.step-icon{width:13px;text-align:center}

.palette-wrap{width:100%;max-width:1100px;margin-top:16px}
.palette-lbl{font-size:0.56rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;
  color:var(--txt-dim);margin-bottom:7px}
.palette-row{display:flex;gap:8px}
.pal-btn{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;
  padding:8px 6px 6px;background:var(--s1);border:2px solid var(--bdr);border-radius:5px;
  cursor:pointer;transition:border-color .15s,box-shadow .15s,transform .1s;user-select:none}
.pal-btn:hover{border-color:var(--bdr-hi);transform:translateY(-1px)}
.pal-btn.sel{border-color:var(--cyan);box-shadow:0 0 0 1px var(--cyan),0 0 10px rgba(0,229,255,.15)}
.pal-sw{width:32px;height:32px;border-radius:3px;border:1px solid rgba(255,255,255,.12)}
.pal-nm{font-size:0.55rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--txt-dim)}
.pal-btn.sel .pal-nm{color:var(--cyan)}
.pal-key{font-size:0.5rem;color:var(--txt-dim);background:var(--s2);
  border:1px solid var(--bdr);padding:1px 4px;border-radius:2px}

.bottom{width:100%;max-width:1100px;display:flex;align-items:center;gap:9px;margin-top:14px}
.btn{font-family:'JetBrains Mono',monospace;font-size:0.7rem;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;padding:10px 20px;
  border-radius:3px;border:none;cursor:pointer;transition:all .14s}
.btn-p{background:var(--cyan);color:#080a0e}
.btn-p:hover{background:#33eeff;box-shadow:0 0 12px rgba(0,229,255,.3)}
.btn-p:disabled{background:var(--bdr);color:var(--txt-dim);cursor:default;box-shadow:none}
.btn-g{background:transparent;color:var(--txt-dim);border:1px solid var(--bdr)}
.btn-g:hover{border-color:var(--bdr-hi);color:var(--txt)}
.status{flex:1;font-size:0.68rem;padding:8px 12px;border-radius:3px;
  border-left:3px solid transparent;background:var(--s1);min-height:36px;
  display:flex;align-items:center;transition:all .2s}
.status.ok{border-color:var(--green);color:var(--green)}
.status.err{border-color:var(--red);color:var(--red)}
.status.info{border-color:var(--cyan);color:var(--cyan)}

/* ── SOLVER PHASE ── */
#solverPhase{display:none;width:100%;max-width:1100px}
#solverPhase.show{display:flex;flex-direction:column;gap:0}

.solver-layout{display:grid;grid-template-columns:380px 1fr;gap:0;
  align-items:start; background:var(--s1);border:1px solid var(--bdr);border-radius:8px;overflow:hidden}

/* cubo 3D */
#cubeCanvas{width:100%;aspect-ratio:1/1;background:#0a0c10;display:block;cursor:grab}
#cubeCanvas:active{cursor:grabbing}

/* barra di avanzamento */
.progress-bar{grid-column:2;padding:14px 18px;border-top:1px solid var(--bdr);
  background:var(--s1);display:flex;align-items:center;gap:12px}
.progress-track{flex:1;height:8px;background:var(--bdr);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:var(--cyan);border-radius:4px;transition:width .2s;width:0%}
.progress-controls{display:flex;align-items:center;gap:8px}
.play-btn{display:flex;align-items:center;justify-content:center;
  width:36px;height:36px;border-radius:4px;border:1px solid var(--bdr);
  background:var(--s2);cursor:pointer;color:var(--txt);font-size:1rem;
  transition:all .15s;user-select:none;flex-shrink:0}
.play-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.play-btn.playing{background:rgba(0,229,255,.2);border-color:var(--cyan);color:var(--cyan)}
.progress-info{text-align:center;min-width:50px;font-size:0.65rem;color:var(--txt-dim)}

/* pannello mosse */
.moves-panel{border-right:1px solid var(--bdr);display:flex;flex-direction:column;min-height:0}
.moves-header{padding:16px 18px 12px;border-bottom:1px solid var(--bdr)}
.moves-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;
  color:var(--txt-hi);margin-bottom:2px}
.moves-sub{font-size:0.6rem;color:var(--txt-dim)}
.moves-sub span{color:var(--cyan)}

.moves-list{flex:1;overflow-y:auto;padding:12px 14px;display:grid;grid-template-columns:repeat(3,1fr);gap:6px;align-content:start}

.move-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 6px;
  border-radius:3px;border:1px solid transparent;transition:all .15s;cursor:pointer;font-size:0.85em;text-align:center}
.move-item:hover{background:rgba(255,255,255,.03);border-color:var(--bdr)}
.move-item.current{background:rgba(0,229,255,.12);border-color:var(--cyan2);box-shadow:0 0 8px rgba(0,229,255,.15)}
.move-item.done{opacity:0.4}
.move-num{font-size:0.5rem;color:var(--txt-dim);margin-bottom:2px}
.move-badge{font-size:0.7rem;font-weight:700;letter-spacing:.03em;
  padding:4px 8px;border-radius:3px;min-width:42px;text-align:center;display:block}
.move-desc{font-size:0.5rem;color:var(--txt-dim);line-height:1.2;display:block;margin-top:2px}
.move-item.current .move-desc{color:var(--txt)}

/* colori badge per faccia */
.mb-U{background:rgba(240,240,240,.15);color:#f0f0f0;border:1px solid rgba(240,240,240,.3)}
.mb-R{background:rgba(224,32,32,.2);color:#ff6060;border:1px solid rgba(224,32,32,.4)}
.mb-F{background:rgba(29,185,84,.2);color:#3dff8a;border:1px solid rgba(29,185,84,.4)}
.mb-D{background:rgba(245,200,0,.15);color:#ffd600;border:1px solid rgba(245,200,0,.3)}
.mb-L{background:rgba(255,115,0,.2);color:#ff9040;border:1px solid rgba(255,115,0,.4)}
.mb-B{background:rgba(21,101,192,.25);color:#5aafff;border:1px solid rgba(21,101,192,.5)}

.moves-nav{padding:14px 18px;border-top:1px solid var(--bdr);
  display:flex;align-items:center;gap:10px}
.nav-btn{display:flex;align-items:center;justify-content:center;
  width:40px;height:40px;border-radius:4px;border:1px solid var(--bdr);
  background:var(--s2);cursor:pointer;color:var(--txt);font-size:1.1rem;
  transition:all .15s;user-select:none;flex-shrink:0}
.nav-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.nav-btn:disabled{opacity:0.3;cursor:default;border-color:var(--bdr);color:var(--txt-dim)}
.nav-info{flex:1;text-align:center}
.nav-pos{font-size:0.75rem;color:var(--txt-hi);font-weight:700}
.nav-total{font-size:0.58rem;color:var(--txt-dim)}
.nav-btn-reset{margin-left:auto;font-size:0.6rem;padding:6px 12px;
  background:transparent;border:1px solid var(--bdr);color:var(--txt-dim);
  border-radius:3px;cursor:pointer;font-family:'JetBrains Mono',monospace;
  text-transform:uppercase;letter-spacing:.05em;transition:all .15s}
.nav-btn-reset:hover{border-color:var(--red);color:var(--red)}

@media(max-width:800px){
  #inputPhase{grid-template-columns:1fr}
  .solver-layout{grid-template-columns:1fr}
  .moves-panel{border-right:none;border-top:1px solid var(--bdr)}
  #cubeCanvas{aspect-ratio:4/3}
}
</style>
</head>
<body>

<header>
  <h1>RUBIK <span>SOLVER</span></h1>
  <div id="stepBadge">Step 1 / 6</div>
</header>

<!-- FASE 1: input colori -->
<div id="inputPhase">
  <div class="cube-map" id="cubeMap"></div>
  <div class="sidebar">
    <div class="panel">
      <div class="panel-title">Posizione cubo</div>
      <div class="instr" id="instrBox"></div>
    </div>
    <div class="panel">
      <div class="panel-title">Conteggio colori</div>
      <div class="ctrs" id="ctrs"></div>
    </div>
    <div class="panel">
      <div class="panel-title">Avanzamento</div>
      <div class="step-list" id="stepList"></div>
    </div>
  </div>
</div>

<div class="palette-wrap" id="paletteWrap">
  <div class="palette-lbl">Pennello — seleziona colore, poi clicca o trascina le celle</div>
  <div class="palette-row" id="palette"></div>
</div>

<div class="bottom" id="bottomBar">
  <button class="btn btn-p" id="btnConferma">Conferma faccia →</button>
  <button class="btn btn-g" id="btnUndo">↩ Annulla</button>
  <button class="btn btn-g" id="btnReset">Reset</button>
  <div class="status" id="status"></div>
</div>

<!-- FASE 2: guida 3D -->
<div id="solverPhase">
  <div class="solver-layout">
    <div class="moves-panel">
      <div class="moves-header">
        <div class="moves-title">Guida risoluzione</div>
        <div class="moves-sub">Mossa <span id="mvCurrent">1</span> di <span id="mvTotal">—</span></div>
      </div>
      <div class="moves-list" id="movesList"></div>
      <div class="moves-nav">
        <button class="nav-btn" id="btnPrev" title="Mossa precedente">←</button>
        <div class="nav-info">
          <div class="nav-pos" id="navPos">0 / 0</div>
          <div class="nav-total">usa ← → o clicca la mossa</div>
        </div>
        <button class="nav-btn" id="btnNext" title="Mossa successiva">→</button>
        <button class="nav-btn-reset" id="btnNewCube">Nuovo cubo</button>
      </div>
    </div>
    <canvas id="cubeCanvas"></canvas>
    <div class="progress-bar" id="progressBar">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-controls">
        <button class="play-btn" id="btnPlay" title="Autoplay">▶</button>
        <div class="progress-info" id="progressInfo">0/0</div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="cube3d.js" type="module"></script>
<script type="module">
import { Cube3D } from './cube3d.js';

// ── Costanti ──────────────────────────────────────────────────────────────────
const FACES_ORDER = ['U','R','F','D','L','B'];
const INPUT_ORDER = ['U','F','R','B','L','D'];
const COLORS = {U:'#f0f0f0',R:'#e02020',F:'#1db954',D:'#f5c800',L:'#ff7300',B:'#1565c0'};
const NAMES  = {U:'Bianco',R:'Rosso',F:'Verde',D:'Giallo',L:'Arancione',B:'Blu'};

// ── URL backend ───────────────────────────────────────────────────────────────
// In locale lascia stringa vuota. Dopo il deploy su Render sostituisci con il tuo URL,
// es: 'https://rubik-solver-api.onrender.com'
const API_BASE = '';

// descrizioni umane delle mosse
const MOVE_DESC = {
  U:"Faccia BIANCA in su — ruota in senso orario",   "U'":"Faccia BIANCA in su — ruota in senso antiorario",  U2:"Faccia BIANCA in su — ruota di 180°",
  R:"Faccia ROSSA a destra — ruota in senso orario", "R'":"Faccia ROSSA a destra — ruota in senso antiorario",R2:"Faccia ROSSA a destra — ruota di 180°",
  F:"Faccia VERDE davanti — ruota in senso orario",  "F'":"Faccia VERDE davanti — ruota in senso antiorario", F2:"Faccia VERDE davanti — ruota di 180°",
  D:"Faccia GIALLA in giù — ruota in senso orario",  "D'":"Faccia GIALLA in giù — ruota in senso antiorario", D2:"Faccia GIALLA in giù — ruota di 180°",
  L:"Faccia ARANCIONE a sinistra — ruota in senso orario","L'":"Faccia ARANCIONE a sinistra — ruota in senso antiorario",L2:"Faccia ARANCIONE a sinistra — ruota di 180°",
  B:"Faccia BLU dietro — ruota in senso orario",     "B'":"Faccia BLU dietro — ruota in senso antiorario",    B2:"Faccia BLU dietro — ruota di 180°",
};
const MOVE_FACE = {U:'U',R:'R',F:'F',D:'D',L:'L',B:'B'};

// ── Stato ─────────────────────────────────────────────────────────────────────
let brush = null, mouseDown = false, state = null;
let moves = [], moveIdx = 0;
let cube3d = null;

// PARAMETRO VELOCITÀ AUTOPLAY — Modifica questo valore per cambiare la velocità (in ms tra le mosse)
const AUTOPLAY_SPEED = 1200;
let isPlaying = false;
let autoplayInterval = null;

// ── API ───────────────────────────────────────────────────────────────────────
async function api(path, body) {
  const opts = body
    ? {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}
    : {method:'GET'};
  return (await fetch(API_BASE + path, opts)).json();
}
async function refresh() { state = await api('/state'); render(); }

// ── Render fase input ─────────────────────────────────────────────────────────
function render() {
  if (!state) return;
  const fa = state.faccia_attiva;
  document.getElementById('stepBadge').textContent = state.completato
    ? 'Completato!' : `Step ${state.step+1} / 6 — ${fa} · ${NAMES[fa]}`;
  document.getElementById('instrBox').innerHTML = state.istruzione || '';

  FACES_ORDER.forEach(f => {
    const wrap = document.querySelector(`.face-wrap[data-f="${f}"]`);
    if (!wrap) return;
    const active = f===fa, done = INPUT_ORDER.indexOf(f)<state.step && !active;
    wrap.className = 'face-wrap'+(active?' active':done?' done':'');
    state.griglia[f].forEach((c,i) => {
      const cell = wrap.querySelector(`.cell[data-i="${i}"]`);
      if (cell) cell.dataset.c = c;
    });
  });

  const ctrs = document.getElementById('ctrs');
  ctrs.innerHTML = '';
  FACES_ORDER.forEach(f => {
    const n = state.contatori[f];
    const row = document.createElement('div');
    row.className = 'ctr-row '+(n===9?'ok':n>9?'over':'low');
    row.innerHTML = `<div class="ctr-sw" style="background:${COLORS[f]}"></div>
      <div class="ctr-nm">${NAMES[f].slice(0,8)}</div>
      <div class="ctr-track"><div class="ctr-fill" style="width:${(n/9)*100}%;background:${COLORS[f]}"></div></div>
      <div class="ctr-val">${n}/9</div>`;
    ctrs.appendChild(row);
  });

  const sl = document.getElementById('stepList');
  sl.innerHTML = '';
  INPUT_ORDER.forEach((f,i) => {
    const item = document.createElement('div');
    const cls = i<state.step?'done':i===state.step?'active':'';
    item.className = 'step-item '+cls;
    item.innerHTML = `<span class="step-icon">${i<state.step?'✓':i===state.step?'→':'·'}</span>
      <div class="dot" style="background:${COLORS[f]}"></div><span>${f} — ${NAMES[f]}</span>`;
    sl.appendChild(item);
  });

  if (state.completato && state.soluzione) showSolverPhase();
}

// ── Fase solver ───────────────────────────────────────────────────────────────
function showSolverPhase() {
  document.getElementById('inputPhase').style.display = 'none';
  document.getElementById('paletteWrap').style.display = 'none';
  document.getElementById('bottomBar').style.display = 'none';
  document.getElementById('solverPhase').classList.add('show');
  document.getElementById('stepBadge').textContent = 'Risoluzione';

  moves = state.soluzione.trim().split(/\s+/).filter(Boolean);
  moveIdx = 0;

  // Init cubo 3D con stato attuale
  const canvas = document.getElementById('cubeCanvas');
  cube3d = new Cube3D(canvas, state.griglia);

  buildMovesList();
  goToMove(0);
  updateProgressBar();
}

function buildMovesList() {
  const list = document.getElementById('movesList');
  list.innerHTML = '';
  document.getElementById('mvTotal').textContent = moves.length;

  // Crea i move-item direttamente nella griglia (3 per riga)
  moves.forEach((mv, i) => {
    const item = document.createElement('div');
    item.className = 'move-item'; item.dataset.idx = i;
    const face = mv.replace(/[0-9']/g,'');
    item.innerHTML = `
      <span class="move-num">${i+1}</span>
      <span class="move-badge mb-${face}">${mv}</span>
      <span class="move-desc">${MOVE_DESC[mv] || mv}</span>`;
    item.addEventListener('click', () => {
      stopAutoplay();
      goToMove(i);
    });
    list.appendChild(item);
  });
}

function goToMove(targetIdx) {
  // Anima il cubo dalla posizione attuale alla target
  if (cube3d) {
    const from = moveIdx, to = targetIdx;
    if (to > from) {
      // avanti: esegui mosse from..to-1
      cube3d.executeMoves(moves.slice(from, to), false);
    } else if (to < from) {
      // indietro: inverti mosse from-1..to
      cube3d.executeMoves(moves.slice(to, from).reverse(), true);
    }
  }
  moveIdx = targetIdx;
  updateMovesUI();
}

function updateMovesUI() {
  const items = document.querySelectorAll('.move-item');
  
  // Aggiorna stato di ogni mossa
  items.forEach((item, i) => {
    item.classList.remove('current','done');
    if (i === moveIdx) item.classList.add('current');
    else if (i < moveIdx) item.classList.add('done');
  });

  // Scroll alla mossa corrente
  const current = document.querySelector('.move-item.current');
  if (current) current.scrollIntoView({block:'nearest',behavior:'smooth'});

  document.getElementById('mvCurrent').textContent = Math.min(moveIdx+1, moves.length);
  document.getElementById('navPos').textContent = `${Math.min(moveIdx+1, moves.length)} / ${moves.length}`;
  document.getElementById('btnPrev').disabled = moveIdx === 0;
  document.getElementById('btnNext').disabled = moveIdx >= moves.length;

  // Aggiorna barra di avanzamento
  updateProgressBar();
}

function updateProgressBar() {
  const percent = moves.length > 0 ? (moveIdx / moves.length) * 100 : 0;
  document.getElementById('progressFill').style.width = percent + '%';
  document.getElementById('progressInfo').textContent = `${moveIdx}/${moves.length}`;
}

function startAutoplay() {
  if (isPlaying || !cube3d) return;
  isPlaying = true;
  document.getElementById('btnPlay').classList.add('playing');
  document.getElementById('btnPlay').textContent = '⏸';
  document.getElementById('btnPlay').title = 'Pausa';

  autoplayInterval = setInterval(() => {
    if (moveIdx < moves.length) {
      goToMove(moveIdx + 1);
    } else {
      stopAutoplay();
    }
  }, AUTOPLAY_SPEED);
}

function stopAutoplay() {
  isPlaying = false;
  if (autoplayInterval) {
    clearInterval(autoplayInterval);
    autoplayInterval = null;
  }
  document.getElementById('btnPlay').classList.remove('playing');
  document.getElementById('btnPlay').textContent = '▶';
  document.getElementById('btnPlay').title = 'Autoplay';
}

// ── Navigazione mosse ─────────────────────────────────────────────────────────
document.getElementById('btnNext').addEventListener('click', () => {
  stopAutoplay();
  if (moveIdx < moves.length) goToMove(moveIdx+1);
});
document.getElementById('btnPrev').addEventListener('click', () => {
  stopAutoplay();
  if (moveIdx > 0) goToMove(moveIdx-1);
});
document.getElementById('btnPlay').addEventListener('click', () => {
  if (isPlaying) {
    stopAutoplay();
  } else {
    startAutoplay();
  }
});
document.getElementById('btnNewCube').addEventListener('click', async () => {
  if (!confirm('Ricominciare con un nuovo cubo?')) return;
  stopAutoplay();
  if (cube3d) { cube3d.destroy(); cube3d = null; }
  moves = []; moveIdx = 0;
  document.getElementById('solverPhase').classList.remove('show');
  document.getElementById('inputPhase').style.display = '';
  document.getElementById('paletteWrap').style.display = '';
  document.getElementById('bottomBar').style.display = '';
  state = await api('/reset', {});
  render();
});

document.addEventListener('keydown', e => {
  if (document.getElementById('solverPhase').classList.contains('show')) {
    if (e.key==='ArrowRight') {
      stopAutoplay();
      document.getElementById('btnNext').click();
    }
    if (e.key==='ArrowLeft') {
      stopAutoplay();
      document.getElementById('btnPrev').click();
    }
    if (e.key===' ') {
      e.preventDefault();
      if (isPlaying) {
        stopAutoplay();
      } else {
        startAutoplay();
      }
    }
    return;
  }
  if (e.key>='1'&&e.key<='6') selectBrush(FACES_ORDER[parseInt(e.key)-1]);
  if (e.key==='z'||e.key==='Z') document.getElementById('btnUndo').click();
  if (e.key==='Enter') document.getElementById('btnConferma').click();
});

// ── Input colori ──────────────────────────────────────────────────────────────
document.addEventListener('mousedown', () => mouseDown = true);
document.addEventListener('mouseup',   () => mouseDown = false);

async function paint(f, i) {
  if (!brush) { setStatus('Seleziona un colore dalla palette!','err'); return; }
  state = await api('/dipingi', {faccia:f, idx:i, colore:brush}); render();
}
function selectBrush(f) {
  brush = f;
  document.querySelectorAll('.pal-btn').forEach(b => b.classList.toggle('sel', b.dataset.f===f));
  setStatus(`Pennello: ${NAMES[f]}`,'info');
}
function setStatus(msg,cls) {
  const el = document.getElementById('status');
  el.textContent = msg; el.className = 'status '+(cls||'');
}

document.getElementById('btnConferma').addEventListener('click', async () => {
  state = await api('/conferma', {}); if (!state.errore) setStatus('',''); render();
});
document.getElementById('btnUndo').addEventListener('click', async () => {
  state = await api('/undo', {});
  state.errore ? setStatus(state.errore,'err') : setStatus('Annullato.','info'); render();
});
document.getElementById('btnReset').addEventListener('click', async () => {
  if (!confirm('Reset completo?')) return;
  brush = null; document.querySelectorAll('.pal-btn').forEach(b=>b.classList.remove('sel'));
  state = await api('/reset', {}); setStatus('Reset eseguito.','info'); render();
});

// ── Build DOM ─────────────────────────────────────────────────────────────────
function buildMap() {
  const map = document.getElementById('cubeMap');
  FACES_ORDER.forEach(f => {
    const wrap = document.createElement('div');
    wrap.className = 'face-wrap'; wrap.dataset.f = f;
    const lbl = document.createElement('div');
    lbl.className = 'face-lbl';
    lbl.innerHTML = `<div class="dot" style="background:${COLORS[f]}"></div>${f} · ${NAMES[f]}`;
    const grid = document.createElement('div'); grid.className = 'face-grid';
    for (let i=0; i<9; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell'+(i===4?' center':'');
      cell.dataset.i=i; cell.dataset.f=f; cell.dataset.c='?';
      if (i!==4) {
        cell.addEventListener('mousedown', e=>{e.preventDefault(); paint(f,i);});
        cell.addEventListener('mouseenter', ()=>{if(mouseDown) paint(f,i);});
      }
      grid.appendChild(cell);
    }
    wrap.appendChild(lbl); wrap.appendChild(grid); map.appendChild(wrap);
  });
}
function buildPalette() {
  const pal = document.getElementById('palette');
  FACES_ORDER.forEach((f,ki) => {
    const btn = document.createElement('div');
    btn.className='pal-btn'; btn.dataset.f=f;
    btn.innerHTML=`<div class="pal-sw" style="background:${COLORS[f]}"></div>
      <div class="pal-nm">${NAMES[f]}</div><div class="pal-key">${ki+1}</div>`;
    btn.addEventListener('click', ()=>selectBrush(f));
    pal.appendChild(btn);
  });
}

buildMap(); buildPalette(); refresh();
</script>
</body>
